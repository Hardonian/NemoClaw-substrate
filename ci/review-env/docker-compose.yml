services:
  review:
    build:
      context: ../..
      dockerfile: ci/review-env/Dockerfile
    container_name: nemoclaw-review-env
    ports:
      - "8080:8080"
    volumes:
      - ../..:/workspace
      - review-node-modules:/workspace/node_modules
    environment:
      - NODE_ENV=development
      - CI=true
    working_dir: /workspace
    command: ["sh", "-c", "echo 'NemoClaw review environment ready' && tail -f /dev/null"]
    healthcheck:
      test: ["CMD", "sh", "-c", "test -d /workspace"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M

volumes:
  review-node-modules:
