name: Fixture Determinism Check

on:
  pull_request:
    paths:
      - "fixtures/generated/**"
      - "scripts/generate-fixtures.ts"
      - "scripts/check-fixtures.ts"
      - "src/lib/control-plane/fixture-generators.ts"
  push:
    branches: [main]
    paths:
      - "fixtures/generated/**"
      - "scripts/generate-fixtures.ts"
      - "scripts/check-fixtures.ts"
      - "src/lib/control-plane/fixture-generators.ts"

permissions:
  contents: read

jobs:
  check-fixtures:
    name: Check fixture determinism
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check fixture determinism
        run: npm run check-fixtures
